<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <pattern id="concrete-stipple" patternUnits="userSpaceOnUse" width="10" height="10">
      <circle cx="2" cy="3" r="0.5" fill="#CCCCCC"/>
      <circle cx="7" cy="8" r="0.5" fill="#CCCCCC"/>
      <circle cx="5" cy="1" r="0.5" fill="#CCCCCC"/>
    </pattern>
    <pattern id="fleece-diagonal" patternUnits="userSpaceOnUse" width="6" height="6">
      <path d="M0,6 L6,0" stroke="#333333" stroke-width="0.75" fill="none"/>
    </pattern>
  </defs>

  <!-- White background -->
  <rect width="1056" height="816" fill="#FFFFFF"/>

  <!-- DRAFT watermark -->
  <text x="528" y="400" font-family="Arial, Helvetica, sans-serif" font-size="48px" fill="#CCCCCC" opacity="0.3" text-anchor="middle" transform="rotate(-25, 528, 400)">DRAFT FOR REVIEW</text>

  <!-- Title -->
  <text x="60" y="50" font-family="Arial, Helvetica, sans-serif" font-size="16px" font-weight="bold" fill="#000000">Barrett PMMA — Inside Corner Reinforcement</text>
  <text x="60" y="68" font-family="Arial, Helvetica, sans-serif" font-size="11px" fill="#333333">Detail — Three-step corner reinforcement at inside angle joint</text>

  <!-- ============ MAIN DETAIL (left side) ============ -->
  <!-- Vertical wall surface -->
  <rect x="100" y="160" width="60" height="340" fill="#F0F0F0" stroke="#000000" stroke-width="1.5"/>
  <rect x="100" y="160" width="60" height="340" fill="url(#concrete-stipple)" opacity="0.4"/>

  <!-- Horizontal deck/floor surface -->
  <rect x="160" y="440" width="300" height="60" fill="#F0F0F0" stroke="#000000" stroke-width="1.5"/>
  <rect x="160" y="440" width="300" height="60" fill="url(#concrete-stipple)" opacity="0.4"/>

  <!-- Inside corner fillet (small radius) -->
  <path d="M160,440 Q160,420 180,420" fill="#F0F0F0" stroke="#000000" stroke-width="1"/>

  <!-- PMMA Primer zone (thin line on both surfaces near corner) -->
  <line x1="160" y1="310" x2="160" y2="440" stroke="#333333" stroke-width="1" stroke-dasharray="2 1"/>
  <line x1="160" y1="440" x2="340" y2="440" stroke="#333333" stroke-width="1" stroke-dasharray="2 1"/>

  <!-- PMMA Base Coat on wall -->
  <rect x="155" y="300" width="8" height="140" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>
  <!-- PMMA Base Coat on floor -->
  <rect x="163" y="432" width="180" height="8" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>
  <!-- Corner transition -->
  <path d="M155,440 Q155,425 163,425 L163,432 Q158,432 158,440 Z" fill="#D8D8D8" stroke="#333333" stroke-width="1.5"/>

  <!-- Fleece strip at corner (dashed pattern) -->
  <rect x="157" y="340" width="4" height="100" fill="url(#fleece-diagonal)" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2"/>
  <rect x="163" y="434" width="120" height="4" fill="url(#fleece-diagonal)" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2"/>
  <!-- Fleece at corner joint -->
  <path d="M157,440 Q157,430 167,430 L163,434 Q159,434 159,440 Z" fill="url(#fleece-diagonal)" stroke="#333333" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- ============ DIMENSIONS: 4 IN. MIN each direction ============ -->
  <!-- Vertical dimension (up wall from corner) -->
  <line x1="135" y1="340" x2="135" y2="440" stroke="#666666" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="130" y1="340" x2="140" y2="340" stroke="#666666" stroke-width="0.75"/>
  <line x1="130" y1="440" x2="140" y2="440" stroke="#666666" stroke-width="0.75"/>
  <text x="95" y="395" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">4 IN.</text>
  <text x="95" y="407" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">MIN</text>

  <!-- Horizontal dimension (along floor from corner) -->
  <line x1="163" y1="465" x2="283" y2="465" stroke="#666666" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="163" y1="460" x2="163" y2="470" stroke="#666666" stroke-width="0.75"/>
  <line x1="283" y1="460" x2="283" y2="470" stroke="#666666" stroke-width="0.75"/>
  <text x="195" y="480" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">4 IN. MIN</text>

  <!-- ============ THREE-STEP SEQUENCE DIAGRAM (right side) ============ -->
  <!-- Step box backgrounds -->
  <rect x="500" y="120" width="200" height="160" rx="4" fill="#FAFAFA" stroke="#000000" stroke-width="1"/>
  <rect x="500" y="300" width="200" height="160" rx="4" fill="#FAFAFA" stroke="#000000" stroke-width="1"/>
  <rect x="500" y="480" width="200" height="160" rx="4" fill="#FAFAFA" stroke="#000000" stroke-width="1"/>

  <!-- Step 1 header -->
  <rect x="500" y="120" width="200" height="24" rx="4" fill="#E8E8E8" stroke="#000000" stroke-width="1"/>
  <text x="600" y="137" font-family="Arial, Helvetica, sans-serif" font-size="11px" font-weight="bold" fill="#000000" text-anchor="middle">STEP 1: Apply Primer</text>

  <!-- Step 1 mini-diagram: corner with primer zone highlighted -->
  <line x1="540" y1="165" x2="540" y2="250" stroke="#000000" stroke-width="1.5"/>
  <line x1="540" y1="250" x2="660" y2="250" stroke="#000000" stroke-width="1.5"/>
  <!-- Primer zone -->
  <line x1="544" y1="185" x2="544" y2="250" stroke="#333333" stroke-width="3" opacity="0.4"/>
  <line x1="540" y1="246" x2="630" y2="246" stroke="#333333" stroke-width="3" opacity="0.4"/>
  <text x="560" y="220" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#000000">PMMA</text>
  <text x="560" y="230" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#000000">PRIMER</text>

  <!-- Arrow from Step 1 to Step 2 -->
  <line x1="600" y1="280" x2="600" y2="296" stroke="#000000" stroke-width="1"/>
  <polygon points="595,296 600,304 605,296" fill="#000000"/>

  <!-- Step 2 header -->
  <rect x="500" y="300" width="200" height="24" rx="4" fill="#E8E8E8" stroke="#000000" stroke-width="1"/>
  <text x="600" y="317" font-family="Arial, Helvetica, sans-serif" font-size="11px" font-weight="bold" fill="#000000" text-anchor="middle">STEP 2: Embed Fleece</text>

  <!-- Step 2 mini-diagram: corner with fleece strip -->
  <line x1="540" y1="345" x2="540" y2="430" stroke="#000000" stroke-width="1.5"/>
  <line x1="540" y1="430" x2="660" y2="430" stroke="#000000" stroke-width="1.5"/>
  <!-- Fleece strip (dashed) -->
  <line x1="546" y1="370" x2="546" y2="430" stroke="#333333" stroke-width="2.5" stroke-dasharray="4 2"/>
  <line x1="540" y1="424" x2="620" y2="424" stroke="#333333" stroke-width="2.5" stroke-dasharray="4 2"/>
  <text x="560" y="400" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#000000">FLEECE IN</text>
  <text x="560" y="410" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#000000">WET RESIN</text>

  <!-- Arrow from Step 2 to Step 3 -->
  <line x1="600" y1="460" x2="600" y2="476" stroke="#000000" stroke-width="1"/>
  <polygon points="595,476 600,484 605,476" fill="#000000"/>

  <!-- Step 3 header -->
  <rect x="500" y="480" width="200" height="24" rx="4" fill="#E8E8E8" stroke="#000000" stroke-width="1"/>
  <text x="600" y="497" font-family="Arial, Helvetica, sans-serif" font-size="11px" font-weight="bold" fill="#000000" text-anchor="middle">STEP 3: Seal Coat</text>

  <!-- Step 3 mini-diagram: corner with full system -->
  <line x1="540" y1="525" x2="540" y2="610" stroke="#000000" stroke-width="1.5"/>
  <line x1="540" y1="610" x2="660" y2="610" stroke="#000000" stroke-width="1.5"/>
  <!-- Full PMMA system -->
  <rect x="543" y="555" width="5" height="55" fill="#D8D8D8" stroke="#333333" stroke-width="1"/>
  <rect x="540" y="605" width="80" height="5" fill="#D8D8D8" stroke="#333333" stroke-width="1"/>
  <text x="560" y="585" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#000000">SEAL COAT</text>
  <text x="560" y="595" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#000000">OVER ALL</text>

  <!-- ============ CALLOUT LEGEND ============ -->
  <text x="720" y="130" font-family="Arial, Helvetica, sans-serif" font-size="10px" font-weight="bold" fill="#000000">CALLOUT KEY</text>
  <line x1="720" y1="135" x2="870" y2="135" stroke="#000000" stroke-width="0.5"/>

  <circle cx="730" cy="158" r="4" fill="#000000"/>
  <text x="740" y="162" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">1</tspan> — Substrate (Wall)</text>

  <circle cx="730" cy="182" r="4" fill="#000000"/>
  <text x="740" y="186" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">2</tspan> — Substrate (Floor/Deck)</text>

  <circle cx="730" cy="206" r="4" fill="#000000"/>
  <text x="740" y="210" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">3</tspan> — PMMA Primer</text>

  <circle cx="730" cy="230" r="4" fill="#000000"/>
  <text x="740" y="234" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">4</tspan> — PMMA Base Coat (Wet Resin)</text>

  <circle cx="730" cy="254" r="4" fill="#000000"/>
  <text x="740" y="258" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">5</tspan> — Fleece Reinforcement</text>

  <circle cx="730" cy="278" r="4" fill="#000000"/>
  <text x="740" y="282" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">6</tspan> — PMMA Seal Coat</text>

  <!-- Callout leaders on main detail -->
  <!-- 1. Wall substrate -->
  <circle cx="130" cy="300" r="3" fill="#000000"/>
  <line x1="130" y1="300" x2="80" y2="260" stroke="#000000" stroke-width="0.5"/>
  <text x="70" y="256" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">1</text>

  <!-- 2. Floor substrate -->
  <circle cx="300" cy="470" r="3" fill="#000000"/>
  <line x1="300" y1="470" x2="340" y2="530" stroke="#000000" stroke-width="0.5"/>
  <text x="345" y="533" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">2</text>

  <!-- 3. Primer -->
  <circle cx="160" cy="380" r="3" fill="#000000"/>
  <line x1="160" y1="380" x2="80" y2="370" stroke="#000000" stroke-width="0.5"/>
  <text x="68" y="373" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">3</text>

  <!-- 4. Base Coat -->
  <circle cx="159" cy="350" r="3" fill="#000000"/>
  <line x1="159" y1="350" x2="80" y2="340" stroke="#000000" stroke-width="0.5"/>
  <text x="68" y="343" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">4</text>

  <!-- 5. Fleece -->
  <circle cx="159" cy="400" r="3" fill="#000000"/>
  <line x1="159" y1="400" x2="80" y2="410" stroke="#000000" stroke-width="0.5"/>
  <text x="68" y="413" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">5</text>

  <!-- 6. Seal Coat -->
  <circle cx="157" cy="320" r="3" fill="#000000"/>
  <line x1="157" y1="320" x2="80" y2="310" stroke="#000000" stroke-width="0.5"/>
  <text x="68" y="313" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">6</text>

  <!-- ============ TITLE BLOCK ============ -->
  <line x1="40" y1="760" x2="1016" y2="760" stroke="#000000" stroke-width="0.75"/>
  <text x="50" y="778" font-family="Arial, Helvetica, sans-serif" font-size="11px" font-weight="bold" fill="#000000">DETAIL ATLAS</text>
  <text x="50" y="792" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">CONSTRUCTION INTELLIGENCE</text>
  <text x="440" y="778" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000" text-anchor="middle">Barrett Company — RamFlash PMMA</text>
  <text x="1010" y="778" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000" text-anchor="end">DRAFT | 2026-04-16</text>
  <text x="528" y="805" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#666666" text-anchor="middle">CSI 07 62 00 | FAM-BARRETT-PMMA | Emergency Detail Delivery</text>
</svg>