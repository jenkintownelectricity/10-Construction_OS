  <circle cx="790" cy="175" r="7" fill="#00E5FF"/><text x="790" y="179" class="callout-num" text-anchor="middle">1</text><text x="806" y="179" class="label">Substrate</text>
  <circle cx="790" cy="200" r="7" fill="#00E5FF"/><text x="790" y="204" class="callout-num" text-anchor="middle">2</text><text x="806" y="204" class="label">Joint / Crack</text>
  <circle cx="790" cy="225" r="7" fill="#00E5FF"/><text x="790" y="229" class="callout-num" text-anchor="middle">3</text><text x="806" y="229" class="label">Backer Rod</text>
  <circle cx="790" cy="250" r="7" fill="#00E5FF"/><text x="790" y="254" class="callout-num" text-anchor="middle">4</text><text x="806" y="254" class="label">PMMA Primer</text>
  <circle cx="790" cy="275" r="7" fill="#FF6B35"/><text x="790" y="279" class="callout-num" text-anchor="middle">5</text><text x="806" y="279" class="label">Fleece Strip</text>
  <circle cx="790" cy="300" r="7" fill="#00E5FF"/><text x="790" y="304" class="callout-num" text-anchor="middle">6</text><text x="806" y="304" class="label">PMMA Membrane</text>

