  <line x1="260" y1="505" x2="260" y2="535" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="280" y1="505" x2="280" y2="535" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="300" y1="505" x2="300" y2="535" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="320" y1="505" x2="320" y2="535" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="340" y1="505" x2="340" y2="535" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="360" y1="505" x2="360" y2="535" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="380" y1="505" x2="380" y2="535" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="400" y1="505" x2="400" y2="535" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="420" y1="505" x2="420" y2="535" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="440" y1="505" x2="440" y2="535" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="460" y1="505" x2="460" y2="535" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="480" y1="505" x2="480" y2="535" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="500" y1="505" x2="500" y2="535" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="520" y1="505" x2="520" y2="535" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="540" y1="505" x2="540" y2="535" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="560" y1="505" x2="560" y2="535" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>

