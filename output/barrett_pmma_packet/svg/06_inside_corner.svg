  <line x1="40" y1="50" x2="480" y2="50" stroke="#00E5FF" stroke-width="1" opacity="0.4"/>
  <text x="40" y="68" class="label" opacity="0.6">3-STEP REINFORCEMENT AT INTERIOR ANGLE</text>

