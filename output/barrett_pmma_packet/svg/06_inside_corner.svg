  <line x1="205" y1="240" x2="235" y2="240" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="205" y1="260" x2="235" y2="260" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="205" y1="280" x2="235" y2="280" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="205" y1="300" x2="235" y2="300" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="205" y1="320" x2="235" y2="320" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="205" y1="340" x2="235" y2="340" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="205" y1="360" x2="235" y2="360" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="205" y1="380" x2="235" y2="380" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="205" y1="400" x2="235" y2="400" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="205" y1="420" x2="235" y2="420" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="205" y1="440" x2="235" y2="440" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="205" y1="460" x2="235" y2="460" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="205" y1="480" x2="235" y2="480" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>

