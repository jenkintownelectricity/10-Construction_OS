  <path d="M240,480 Q240,500 260,500" fill="none" stroke="#4A657D" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="248" y="495" class="dim" font-size="8">R</text>

  <!-- STEP 1: PMMA PRIMER (cyan, innermost) -->
  <line x1="243" y1="350" x2="243" y2="480" stroke="#00E5FF" stroke-width="3" opacity="0.6"/>
  <path d="M243,480 Q243,497 260,497" fill="none" stroke="#00E5FF" stroke-width="3" opacity="0.6"/>
  <line x1="260" y1="497" x2="400" y2="497" stroke="#00E5FF" stroke-width="3" opacity="0.6"/>

  <!-- STEP 2: FLEECE IN RESIN (orange, middle) -->
  <line x1="247" y1="360" x2="247" y2="476" stroke="#FF6B35" stroke-width="2" stroke-dasharray="6,3"/>
  <path d="M247,476 Q247,493 264,493" fill="none" stroke="#FF6B35" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="264" y1="493" x2="390" y2="493" stroke="#FF6B35" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- STEP 3: SEAL COAT (cyan, outermost) -->
  <line x1="251" y1="355" x2="251" y2="472" stroke="#00E5FF" stroke-width="3"/>
  <path d="M251,472 Q251,489 268,489" fill="none" stroke="#00E5FF" stroke-width="3"/>
  <line x1="268" y1="489" x2="395" y2="489" stroke="#00E5FF" stroke-width="3"/>

