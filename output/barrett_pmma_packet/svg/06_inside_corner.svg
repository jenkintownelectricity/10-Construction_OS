  <rect x="200" y="150" width="40" height="350" fill="#1A1D21" stroke="#4A657D" stroke-width="1"/>
  <line x1="205" y1="160" x2="235" y2="160" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="205" y1="180" x2="235" y2="180" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="205" y1="200" x2="235" y2="200" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
