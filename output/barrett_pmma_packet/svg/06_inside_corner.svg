  <line x1="195" y1="365" x2="195" y2="495" stroke="#4A657D" stroke-width="0.8" stroke-dasharray="4,2"/>
  <line x1="190" y1="500" x2="200" y2="500" stroke="#4A657D" stroke-width="1"/>
  <line x1="190" y1="360" x2="200" y2="360" stroke="#4A657D" stroke-width="1"/>
  <polygon points="195,368 192,376 198,376" fill="#4A657D"/>
  <polygon points="195,492 192,484 198,484" fill="#4A657D"/>
  <text x="185" y="435" class="dim" transform="rotate(-90, 185, 435)" text-anchor="middle">4 IN. MIN</text>

  <!-- 4 IN. MIN horizontal dimension -->
  <line x1="240" y1="510" x2="240" y2="555" stroke="#4A657D" stroke-width="0.5" stroke-dasharray="3,2"/>
  <line x1="395" y1="510" x2="395" y2="555" stroke="#4A657D" stroke-width="0.5" stroke-dasharray="3,2"/>
  <line x1="245" y1="550" x2="390" y2="550" stroke="#4A657D" stroke-width="0.8" stroke-dasharray="4,2"/>
  <line x1="240" y1="545" x2="240" y2="555" stroke="#4A657D" stroke-width="1"/>
  <line x1="395" y1="545" x2="395" y2="555" stroke="#4A657D" stroke-width="1"/>
  <polygon points="248,550 256,547 256,553" fill="#4A657D"/>
  <polygon points="387,550 379,547 379,553" fill="#4A657D"/>
  <text x="318" y="565" class="dim" text-anchor="middle">4 IN. MIN</text>

  <!-- STEP 1 callout -->
  <rect x="620" y="180" width="380" height="75" fill="#0A0D11" stroke="#00E5FF" stroke-width="1" rx="3" opacity="0.9"/>
  <text x="640" y="205" class="step-num">STEP 1</text>
  <text x="745" y="205" class="step-label">PMMA PRIMER</text>
  <text x="640" y="225" class="label">Apply Barrett PMMA primer to all</text>
  <text x="640" y="240" class="label">surfaces in corner area. Allow tack.</text>
  <line x1="620" y1="220" x2="400" y2="497" stroke="#00E5FF" stroke-width="0.5" stroke-dasharray="4,3"/>
  <circle cx="400" cy="497" r="4" fill="none" stroke="#00E5FF" stroke-width="1"/>

  <!-- STEP 2 callout -->
  <rect x="620" y="280" width="380" height="75" fill="#0A0D11" stroke="#FF6B35" stroke-width="1" rx="3" opacity="0.9"/>
  <text x="640" y="305" class="step-num" fill="#FF6B35">STEP 2</text>
  <text x="745" y="305" class="step-label">FLEECE IN RESIN</text>
  <text x="640" y="325" class="label">Embed fleece reinforcement into wet</text>
  <text x="640" y="340" class="label">PMMA resin. Saturate fully.</text>
  <line x1="620" y1="320" x2="390" y2="493" stroke="#FF6B35" stroke-width="0.5" stroke-dasharray="4,3"/>
  <circle cx="390" cy="493" r="4" fill="none" stroke="#FF6B35" stroke-width="1"/>

  <!-- STEP 3 callout -->
  <rect x="620" y="380" width="380" height="75" fill="#0A0D11" stroke="#00E5FF" stroke-width="1" rx="3" opacity="0.9"/>
  <text x="640" y="405" class="step-num">STEP 3</text>
  <text x="745" y="405" class="step-label">SEAL COAT</text>
  <text x="640" y="425" class="label">Apply PMMA seal coat over cured</text>
  <text x="640" y="440" class="label">reinforcement. Full coverage.</text>
  <line x1="620" y1="420" x2="395" y2="489" stroke="#00E5FF" stroke-width="0.5" stroke-dasharray="4,3"/>
  <circle cx="395" cy="489" r="4" fill="none" stroke="#00E5FF" stroke-width="1"/>

  <!-- Material Key -->
  <rect x="620" y="500" width="380" height="80" fill="#0A0D11" stroke="#4A657D" stroke-width="0.5" rx="2"/>
  <text x="640" y="525" class="title" font-size="11">MATERIAL KEY</text>
  <line x1="640" y1="532" x2="980" y2="532" stroke="#4A657D" stroke-width="0.5" opacity="0.4"/>
  <line x1="640" y1="550" x2="670" y2="550" stroke="#00E5FF" stroke-width="3"/>
  <text x="680" y="554" class="label">PMMA System (Primer / Seal Coat)</text>
  <line x1="640" y1="570" x2="670" y2="570" stroke="#FF6B35" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="680" y="574" class="label">Fleece Reinforcement</text>

  <text x="265" y="475" class="dim" font-size="8">FILLET</text>

  <!-- Bottom Bar -->
  <rect x="0" y="786" width="1056" height="30" fill="#0A0D11" stroke="#4A657D" stroke-width="0.5"/>
  <text x="40" y="805" class="bottom-bar-title">DETAIL ATLAS | CONSTRUCTION INTELLIGENCE</text>
  <text x="1016" y="805" class="bottom-bar" text-anchor="end">Barrett PMMA Emergency Packet | 2026-04-16</text>
  <text x="528" y="805" class="dim" text-anchor="middle">CONDITION 06 — INSIDE CORNER REINFORCEMENT</text>
</svg>
