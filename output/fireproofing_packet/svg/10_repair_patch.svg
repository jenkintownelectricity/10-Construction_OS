  <circle cx="540" cy="280" r="8" fill="#00E5FF"/>
  <text x="540" y="284" class="callout-num" text-anchor="middle">2</text>
  <line x1="540" y1="288" x2="540" y2="520" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="540" y1="520" x2="620" y2="520" stroke="#00E5FF" stroke-width="1"/>
  <text x="625" y="524" class="label">Damaged / Removed Zone</text>

