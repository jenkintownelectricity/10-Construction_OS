  <line x1="412" y1="520" x2="340" y2="520" stroke="#00E5FF" stroke-width="1"/>
  <text x="245" y="524" class="label">Min Overlap</text>

  <!-- Repair procedure note -->
  <rect x="40" y="570" width="560" height="80" rx="3" fill="none" stroke="#FF4444" stroke-width="1" opacity="0.5"/>
  <text x="55" y="590" class="label" fill="#FF4444">REPAIR PROCEDURE:</text>
  <text x="55" y="607" class="label" fill="#B0B7BD">1. Remove loose/damaged SFRM to sound material</text>
  <text x="55" y="621" class="label" fill="#B0B7BD">2. Clean and prepare substrate (wire brush)</text>
  <text x="55" y="635" class="label" fill="#B0B7BD">3. Apply patch SFRM to match existing thickness, feather edges 6" min</text>

  <!-- Legend -->
  <rect x="40" y="690" width="16" height="10" fill="#5C6670" stroke="#8B959E" stroke-width="1"/>
  <text x="62" y="699" class="label">Steel</text>
  <rect x="130" y="690" width="16" height="10" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1"/>
  <text x="152" y="699" class="label">Existing SFRM</text>
  <rect x="280" y="690" width="16" height="10" fill="#D4A574" opacity="0.9" stroke="#E8C39E" stroke-width="2"/>
  <text x="302" y="699" class="label">Patch Material</text>
  <rect x="430" y="690" width="16" height="10" fill="none" stroke="#FF4444" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="452" y="699" class="label">Damage Zone</text>

  <!-- Bottom Bar -->
  <rect x="0" y="790" width="1056" height="26" fill="#0D1117"/>
  <line x1="0" y1="790" x2="1056" y2="790" stroke="#1A1D21" stroke-width="1"/>
  <text x="528" y="806" class="bar-text" text-anchor="middle">DETAIL ATLAS | CONSTRUCTION INTELLIGENCE | Fireproofing Starter Packet | 2026-04-16</text>
