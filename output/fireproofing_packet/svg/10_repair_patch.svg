  <text x="40" y="45" class="title">Fireproofing — Repair / Patch Condition</text>
  <line x1="40" y1="55" x2="510" y2="55" stroke="#FF4444" stroke-width="1" opacity="0.4"/>

  <!-- Fire Rating Badge -->
  <rect x="880" y="25" width="140" height="35" rx="3" fill="none" stroke="#FF4444" stroke-width="2"/>
  <text x="950" y="42" font-family="JetBrains Mono, monospace" font-size="11" fill="#FF4444" text-anchor="middle" font-weight="bold">FIRE RATING</text>
  <text x="950" y="54" font-family="JetBrains Mono, monospace" font-size="10" fill="#FF4444" text-anchor="middle">MATCH EXISTING</text>

  <!-- === ELEVATION VIEW OF BEAM BOTTOM === -->

  <!-- Beam - shown as horizontal member -->
  <!-- Top Flange -->
  <rect x="80" y="200" width="900" height="20" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>
  <!-- Web -->
  <rect x="80" y="220" width="900" height="120" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>
  <!-- Bottom Flange -->
  <rect x="80" y="340" width="900" height="20" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>

  <!-- Existing SFRM - LEFT section (intact) -->
  <rect x="65" y="183" width="350" height="17" rx="2" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>
  <rect x="65" y="183" width="15" height="194" rx="2" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>
  <rect x="65" y="360" width="350" height="17" rx="2" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>

  <!-- Existing SFRM - RIGHT section (intact) -->
  <rect x="680" y="183" width="315" height="17" rx="2" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>
  <rect x="980" y="183" width="15" height="194" rx="2" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>
  <rect x="680" y="360" width="315" height="17" rx="2" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>

