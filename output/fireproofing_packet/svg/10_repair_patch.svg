  <path d="M415,200 L430,183 L430,200 Z" fill="#D4A574" opacity="0.5" stroke="#E8C39E" stroke-width="1"/>
  <!-- Feathered Edges - RIGHT transition (top) -->
  <path d="M660,200 L660,183 L680,200 Z" fill="#D4A574" opacity="0.5" stroke="#E8C39E" stroke-width="1"/>
  <!-- Feathered Edges - LEFT transition (bottom) -->
  <path d="M415,360 L430,377 L430,360 Z" fill="#D4A574" opacity="0.5" stroke="#E8C39E" stroke-width="1"/>
  <!-- Feathered Edges - RIGHT transition (bottom) -->
  <path d="M660,360 L660,377 L680,360 Z" fill="#D4A574" opacity="0.5" stroke="#E8C39E" stroke-width="1"/>

