  <line x1="250" y1="183" x2="250" y2="130" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="250" y1="130" x2="330" y2="130" stroke="#00E5FF" stroke-width="1"/>
