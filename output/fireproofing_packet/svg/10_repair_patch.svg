  <line x1="545" y1="181" x2="545" y2="130" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="545" y1="130" x2="630" y2="130" stroke="#00E5FF" stroke-width="1"/>
  <text x="635" y="134" class="label">Patch Material (new SFRM)</text>

  <!-- Callout 5: Feathered Edge -->
  <circle cx="420" cy="190" r="12" fill="none" stroke="#00E5FF" stroke-width="1"/>
  <line x1="410" y1="180" x2="200" y2="100" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="192" cy="97" r="8" fill="#00E5FF"/>
  <text x="192" y="101" class="callout-num" text-anchor="middle">5</text>
  <text x="115" y="101" class="label">Feathered Edge</text>

