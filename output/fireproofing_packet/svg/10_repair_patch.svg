  <line x1="430" y1="200" x2="445" y2="210" stroke="#FF4444" stroke-width="0.8" opacity="0.4"/>
  <line x1="460" y1="195" x2="475" y2="205" stroke="#FF4444" stroke-width="0.8" opacity="0.4"/>
  <line x1="620" y1="360" x2="640" y2="370" stroke="#FF4444" stroke-width="0.8" opacity="0.4"/>
  <line x1="550" y1="355" x2="565" y2="370" stroke="#FF4444" stroke-width="0.8" opacity="0.4"/>

