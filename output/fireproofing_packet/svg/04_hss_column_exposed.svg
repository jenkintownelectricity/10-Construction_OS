<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <style>
      .title { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: bold; fill: #FF4444; }
      .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #B0B7BD; }
      .dim { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #4A657D; }
      .callout-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: bold; fill: #0A0D11; }
      .bar-text { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #4A657D; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1056" height="816" fill="#0A0D11"/>

  <!-- DRAFT Watermark -->
  <text x="528" y="450" font-family="JetBrains Mono, monospace" font-size="60" fill="#FF4444" opacity="0.08" text-anchor="middle" transform="rotate(-30, 528, 450)">DRAFT</text>

  <!-- Title -->
  <text x="40" y="45" class="title">Fireproofing — HSS Column Exposed SFRM</text>
  <line x1="40" y1="55" x2="530" y2="55" stroke="#FF4444" stroke-width="1" opacity="0.4"/>

  <!-- Fire Rating Badge -->
  <rect x="880" y="25" width="140" height="35" rx="3" fill="none" stroke="#FF4444" stroke-width="2"/>
  <text x="950" y="42" font-family="JetBrains Mono, monospace" font-size="11" fill="#FF4444" text-anchor="middle" font-weight="bold">FIRE RATING</text>
  <text x="950" y="54" font-family="JetBrains Mono, monospace" font-size="10" fill="#FF4444" text-anchor="middle">2-HR</text>

  <!-- Main Section View (left side) -->
  <!-- HSS Tube -->
  <rect x="340" y="180" width="160" height="160" fill="#5C6670" stroke="#8B959E" stroke-width="2.5"/>
  <!-- HSS hollow interior -->
  <rect x="356" y="196" width="128" height="128" fill="#0A0D11" stroke="#8B959E" stroke-width="1"/>

  <!-- SFRM on all 4 sides -->
  <!-- Top SFRM -->
  <rect x="315" y="155" width="210" height="25" rx="4" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>
  <!-- Bottom SFRM -->
  <rect x="315" y="340" width="210" height="25" rx="4" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>
  <!-- Left SFRM -->
  <rect x="315" y="155" width="25" height="210" rx="4" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>
  <!-- Right SFRM -->
  <rect x="500" y="155" width="25" height="210" rx="4" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>

  <!-- Corner build-up detail (enlarged, right side) -->
  <rect x="700" y="150" width="260" height="260" fill="none" stroke="#4A657D" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="830" y="145" class="label" text-anchor="middle" fill="#4A657D">CORNER DETAIL (ENLARGED)</text>

  <!-- Corner detail - HSS corner -->
  <path d="M800,220 L800,350 L920,350 L920,220 Z" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>
  <!-- Corner detail - SFRM wrapping corner with build-up -->
  <path d="M770,195 L770,375 Q770,380 775,380 L945,380 Q950,380 950,375 L950,195 Q950,190 945,190 L775,190 Q770,190 770,195 Z" fill="#D4A574" opacity="0.5" stroke="#E8C39E" stroke-width="1.5"/>
  <!-- Build-up highlight at corner -->
  <path d="M770,190 Q770,190 770,195 L770,220 L800,220 L800,190 Q795,190 790,190 Z" fill="#D4A574" opacity="0.9" stroke="#E8C39E" stroke-width="1.5"/>

  <!-- Corner build-up dimension -->
  <line x1="758" y1="190" x2="758" y2="220" stroke="#00E5FF" stroke-width="0.8"/>
  <line x1="753" y1="190" x2="763" y2="190" stroke="#00E5FF" stroke-width="0.8"/>
  <line x1="753" y1="220" x2="763" y2="220" stroke="#00E5FF" stroke-width="0.8"/>
  <text x="748" y="210" class="dim" text-anchor="end">Build-up</text>

  <!-- Callout 1: HSS Tube -->
  <circle cx="420" cy="260" r="8" fill="#00E5FF"/>
  <text x="420" y="264" class="callout-num" text-anchor="middle">1</text>
  <line x1="420" y1="268" x2="420" y2="470" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="375" y="490" class="label">HSS Tube</text>

  <!-- Callout 2: SFRM Coating -->
  <circle cx="327" cy="260" r="8" fill="#00E5FF"/>
  <text x="327" y="264" class="callout-num" text-anchor="middle">2</text>
  <line x1="319" y1="260" x2="140" y2="260" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="50" y="264" class="label">SFRM Coating</text>

  <!-- Callout 3: Corner Build-Up -->
  <circle cx="780" cy="200" r="8" fill="#00E5FF"/>
  <text x="780" y="204" class="callout-num" text-anchor="middle">3</text>
  <line x1="780" y1="192" x2="780" y2="170" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="730" y="165" class="label">Corner Build-Up</text>

  <!-- Callout 4: Min Thickness -->
  <circle cx="860" cy="300" r="8" fill="#00E5FF"/>
  <text x="860" y="304" class="callout-num" text-anchor="middle">4</text>
  <line x1="860" y1="308" x2="860" y2="395" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="820" y="415" class="label">Min Thickness</text>

  <!-- Dimension: SFRM thickness (top) -->
  <line x1="540" y1="155" x2="560" y2="155" stroke="#00E5FF" stroke-width="0.8"/>
  <line x1="540" y1="180" x2="560" y2="180" stroke="#00E5FF" stroke-width="0.8"/>
  <line x1="550" y1="155" x2="550" y2="180" stroke="#00E5FF" stroke-width="0.8"/>
  <text x="565" y="172" class="dim">1-1/16" min.</text>

  <!-- Dimension: SFRM thickness (side) -->
  <line x1="500" y1="390" x2="525" y2="390" stroke="#00E5FF" stroke-width="0.8"/>
  <line x1="500" y1="395" x2="500" y2="385" stroke="#00E5FF" stroke-width="0.8"/>
  <line x1="525" y1="395" x2="525" y2="385" stroke="#00E5FF" stroke-width="0.8"/>
  <text x="490" y="410" class="dim">1-1/16" min.</text>

  <!-- HSS dimension -->
  <line x1="340" y1="400" x2="340" y2="420" stroke="#00E5FF" stroke-width="0.5"/>
  <line x1="500" y1="400" x2="500" y2="420" stroke="#00E5FF" stroke-width="0.5"/>
  <line x1="340" y1="415" x2="500" y2="415" stroke="#00E5FF" stroke-width="0.5"/>
  <polygon points="340,415 347,412 347,418" fill="#00E5FF"/>
  <polygon points="500,415 493,412 493,418" fill="#00E5FF"/>
  <text x="400" y="412" class="dim" text-anchor="middle">8"</text>

  <!-- Section note -->
  <text x="40" y="560" class="label" opacity="0.6">PLAN SECTION — HSS column with direct-applied SFRM</text>
  <text x="40" y="580" class="label" opacity="0.6">Corner build-up ensures minimum thickness at all points</text>
  <text x="40" y="600" class="label" opacity="0.6">Verify W/D ratio for required thickness per UL listing</text>

  <!-- Legend -->
  <rect x="40" y="690" width="16" height="10" fill="#5C6670" stroke="#8B959E" stroke-width="1"/>
  <text x="62" y="699" class="label">Steel HSS</text>
  <rect x="170" y="690" width="16" height="10" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1"/>
  <text x="192" y="699" class="label">SFRM (Spray-Applied)</text>

  <!-- Bottom Bar -->
  <rect x="0" y="790" width="1056" height="26" fill="#0D1117"/>
  <line x1="0" y1="790" x2="1056" y2="790" stroke="#1A1D21" stroke-width="1"/>
  <text x="528" y="806" class="bar-text" text-anchor="middle">DETAIL ATLAS | CONSTRUCTION INTELLIGENCE | Fireproofing Starter Packet | 2026-04-16</text>
</svg>