<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <pattern id="stipple" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#D8D8D8"/>
      <circle cx="1" cy="1" r="0.6" fill="#999"/>
      <circle cx="4" cy="4" r="0.6" fill="#999"/>
    </pattern>
    <pattern id="stipple-lg" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#D8D8D8"/>
      <circle cx="2" cy="2" r="0.7" fill="#999"/>
      <circle cx="6" cy="6" r="0.7" fill="#999"/>
      <circle cx="6" cy="2" r="0.5" fill="#aaa"/>
      <circle cx="2" cy="6" r="0.5" fill="#aaa"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1056" height="816" fill="#FFFFFF"/>

  <!-- DRAFT Watermark -->
  <text x="528" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" fill="#CCCCCC" opacity="0.3" transform="rotate(-25,528,400)">DRAFT</text>

  <!-- Title -->
  <text x="528" y="50" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#000000">Fireproofing — Shear Tab Connection</text>
  <text x="528" y="68" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#333333">Plan Section — SFRM Encapsulating Shear Tab and Connection Hardware</text>

  <!-- Fire Rating Badge -->
  <rect x="900" y="32" width="100" height="28" rx="3" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="950" y="51" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#000000">2-HR RATED</text>

  <!-- === MAIN DRAWING (plan view at connection) === -->

  <!-- SFRM encapsulation envelope (drawn first, behind everything) -->
  <!-- Column SFRM -->
  <rect x="240" y="160" width="220" height="420" rx="5" fill="url(#stipple-lg)" stroke="#666666" stroke-width="1"/>
  <!-- Beam SFRM -->
  <rect x="430" y="280" width="460" height="180" rx="5" fill="url(#stipple-lg)" stroke="#666666" stroke-width="1"/>
  <!-- Connection encapsulation overlap -->
  <rect x="430" y="270" width="80" height="200" fill="url(#stipple)" stroke="#666666" stroke-width="0.75"/>

  <!-- Column (plan view - seeing flanges and web) -->
  <!-- Column left flange -->
  <rect x="270" y="170" width="14" height="400" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>
  <!-- Column right flange -->
  <rect x="416" y="170" width="14" height="400" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>
  <!-- Column web -->
  <rect x="284" y="170" width="132" height="400" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>

  <!-- Shear tab (welded to column flange, extending right) -->
  <rect x="430" y="330" width="80" height="10" fill="#C0C0C0" stroke="#000000" stroke-width="1.5"/>
  <!-- Weld symbol at column -->
  <polygon points="430,327 425,320 430,330" fill="#000000" stroke="none"/>
  <polygon points="430,343 425,350 430,340" fill="#000000" stroke="none"/>

  <!-- Beam (plan view - web visible) -->
  <!-- Beam web -->
  <rect x="460" y="330" width="420" height="10" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>
  <!-- Beam top flange (in plan, appears as line on top side) -->
  <rect x="460" y="295" width="420" height="14" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>
  <!-- Beam bottom flange (in plan, appears as line on bottom side) -->
  <rect x="460" y="432" width="420" height="14" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>

  <!-- Bolts through shear tab and beam web -->
  <circle cx="475" cy="335" r="5" fill="#A0A0A0" stroke="#000000" stroke-width="1"/>
  <circle cx="495" cy="335" r="5" fill="#A0A0A0" stroke="#000000" stroke-width="1"/>
  <circle cx="505" cy="335" r="5" fill="#A0A0A0" stroke="#000000" stroke-width="1" opacity="0"/>
  <!-- Bolt center marks -->
  <line x1="472" y1="335" x2="478" y2="335" stroke="#000000" stroke-width="0.5"/>
  <line x1="475" y1="332" x2="475" y2="338" stroke="#000000" stroke-width="0.5"/>
  <line x1="492" y1="335" x2="498" y2="335" stroke="#000000" stroke-width="0.5"/>
  <line x1="495" y1="332" x2="495" y2="338" stroke="#000000" stroke-width="0.5"/>

  <!-- Gap between beam end and column flange -->
  <line x1="460" y1="316" x2="460" y2="428" stroke="#666666" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="440" y="380" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#666666" transform="rotate(-90,440,380)">GAP</text>

  <!-- === CALLOUTS === -->
  <!-- Column Flange -->
  <line x1="416" y1="250" x2="180" y2="120" stroke="#000000" stroke-width="0.5"/>
  <circle cx="416" cy="250" r="2" fill="#000000"/>
  <text x="60" y="114" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">COLUMN FLANGE</text>
  <text x="60" y="128" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">W12x65 column, near-side flange</text>

  <!-- Shear Tab -->
  <line x1="455" y1="335" x2="180" y2="250" stroke="#000000" stroke-width="0.5"/>
  <circle cx="455" cy="335" r="2" fill="#000000"/>
  <text x="60" y="244" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">SHEAR TAB</text>
  <text x="60" y="258" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">3/8" plate, shop-welded to column</text>

  <!-- Beam Web -->
  <line x1="600" y1="335" x2="800" y2="510" stroke="#000000" stroke-width="0.5"/>
  <circle cx="600" cy="335" r="2" fill="#000000"/>
  <text x="805" y="504" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">BEAM WEB</text>
  <text x="805" y="518" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">W16x31 beam web</text>

  <!-- Bolts -->
  <line x1="475" y1="340" x2="180" y2="380" stroke="#000000" stroke-width="0.5"/>
  <circle cx="475" cy="340" r="2" fill="#000000"/>
  <text x="60" y="374" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">BOLTS</text>
  <text x="60" y="388" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">3/4" dia. A325-N (typ.)</text>
  <text x="60" y="402" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">Through shear tab and beam web</text>

  <!-- SFRM Encapsulation -->
  <line x1="460" y1="290" x2="800" y2="170" stroke="#000000" stroke-width="0.5"/>
  <circle cx="460" cy="290" r="2" fill="#000000"/>
  <text x="805" y="164" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">SFRM ENCAPSULATION</text>
  <text x="805" y="178" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">Continuous SFRM over entire</text>
  <text x="805" y="192" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">connection assembly</text>

  <!-- Column SFRM -->
  <line x1="260" y1="350" x2="180" y2="500" stroke="#000000" stroke-width="0.5"/>
  <circle cx="260" cy="350" r="2" fill="#000000"/>
  <text x="60" y="494" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">COLUMN SFRM</text>
  <text x="60" y="508" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">Full encapsulation of column section</text>

  <!-- Notes -->
  <text x="80" y="610" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#000000">NOTES:</text>
  <text x="80" y="626" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">1. SFRM shall fully encapsulate shear tab, bolts, and connection hardware.</text>
  <text x="80" y="640" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">2. No voids permitted in SFRM at connection zone.</text>
  <text x="80" y="654" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">3. Column and beam SFRM transitions must be continuous through connection.</text>
  <text x="80" y="668" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">4. Minimum SFRM thickness over bolt heads: equal to flat surface requirement.</text>

  <text x="80" y="700" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">SCALE: NOT TO SCALE | VIEW: PLAN SECTION AT CONNECTION</text>

  <!-- === TITLE BLOCK === -->
  <line x1="40" y1="760" x2="1016" y2="760" stroke="#000000" stroke-width="0.75"/>
  <text x="60" y="778" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#000000">DETAIL ATLAS | CONSTRUCTION INTELLIGENCE</text>
  <text x="528" y="778" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#000000">Fireproofing — SFRM / Enclosure</text>
  <text x="996" y="778" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#000000">DRAFT | 2026-04-16</text>
  <text x="528" y="796" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#333333">CSI 07 81 00 | Generic SFRM | Starter Packet</text>
  <text x="996" y="796" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#333333">Sheet 06 of 10</text>
</svg>